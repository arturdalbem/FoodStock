{% extends "base.html" %}

{% block titulo %}
Dashboard
{% endblock %}

{% block titulo_pagina %}
Dashboard
{% endblock %}

{% block conteudo %}

<div class="row">

    <div class="col-md-4">

        <div class="card shadow dashboard-card">

            <div class="card-body text-center">

                <i class="bi bi-box-seam fs-1 text-success"></i>

                <h5 class="mt-3">
                    Produtos Cadastrados
                </h5>

                <h2>
                    {{ total_produtos }}
                </h2>

            </div>

        </div>

    </div>

    <div class="col-md-4">

        <div class="card shadow dashboard-card">

            <div class="card-body text-center">

                <i class="bi bi-exclamation-triangle fs-1 text-warning"></i>

                <h5 class="mt-3">
                    Estoque Baixo
                </h5>

                <h2>0</h2>

            </div>

        </div>

    </div>

    <div class="col-md-4">

        <div class="card shadow dashboard-card">

            <div class="card-body text-center">

                <i class="bi bi-calendar-event fs-1 text-danger"></i>

                <h5 class="mt-3">
                    Produtos Vencendo
                </h5>

                <h2>0</h2>

            </div>

        </div>

    </div>

</div>

<div class="card mt-4 shadow">

    <div class="card-body">

        <h4>Ações Rápidas</h4>

        <a href="/produtos" class="btn btn-success">

            <i class="bi bi-box-fill"></i>

            Gerenciar Produtos

        </a>

    </div>

</div>

{% endblock %}
