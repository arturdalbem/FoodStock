{% extends "base.html" %}

{% block titulo %}
Editar Produto
{% endblock %}

{% block titulo_pagina %}
Editar Produto
{% endblock %}

{% block conteudo %}

<div class="card shadow border-0">

    <div class="card-header bg-warning">

        <h4 class="mb-0">
            <i class="bi bi-pencil-fill"></i>
            Editar Produto
        </h4>

    </div>

    <div class="card-body">

        <form method="POST">

            <div class="row">

                <div class="col-md-6 mb-3">
                    <label class="form-label">Nome</label>
                    <input
                        type="text"
                        name="nome"
                        class="form-control"
                        value="{{ produto[1] }}"
                        required>
                </div>

                <div class="col-md-6 mb-3">
                    <label class="form-label">Categoria</label>
                    <input
                        type="text"
                        name="categoria"
                        class="form-control"
                        value="{{ produto[2] }}"
                        required>
                </div>

                <div class="col-md-6 mb-3">
                    <label class="form-label">Lote</label>
                    <input
                        type="text"
                        name="lote"
                        class="form-control"
                        value="{{ produto[3] }}"
                        required>
                </div>

                <div class="col-md-3 mb-3">
                    <label class="form-label">Quantidade</label>
                    <input
                        type="number"
                        name="quantidade"
                        class="form-control"
                        value="{{ produto[4] }}"
                        required>
                </div>

                <div class="col-md-3 mb-3">
                    <label class="form-label">Qtd. Mínima</label>
                    <input
                        type="number"
                        name="quantidade_minima"
                        class="form-control"
                        value="{{ produto[5] }}"
                        required>
                </div>

                <div class="col-md-3 mb-3">
                    <label class="form-label">Unidade</label>
                    <input
                        type="text"
                        name="unidade"
                        class="form-control"
                        value="{{ produto[6] }}"
                        required>
                </div>

                <div class="col-md-3 mb-3">
                    <label class="form-label">Validade</label>
                    <input
                        type="date"
                        name="data_validade"
                        class="form-control"
                        value="{{ produto[7] }}"
                        required>
                </div>

            </div>

            <button class="btn btn-warning">
                <i class="bi bi-check-circle-fill"></i>
                Salvar Alterações
            </button>

            <a href="/produtos" class="btn btn-secondary">
                Cancelar
            </a>

        </form>

    </div>

</div>

{% endblock %}
