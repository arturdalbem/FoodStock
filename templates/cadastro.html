<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <title>Criar Conta - FoodStock</title>

    <link rel="stylesheet"
          href="{{ url_for('static', filename='css/style.css') }}">
</head>

<body>

    <h1>Criar Conta</h1>

    <form method="POST">

        <label>Nome Completo</label>
        <br>
        <input type="text" name="nome" required>

        <br><br>

        <label>Email</label>
        <br>
        <input type="email" name="email" required>

        <br><br>

        <label>Senha</label>
        <br>
        <input type="password" name="senha" required>

        <br><br>

        <label>Confirmar Senha</label>
        <br>
        <input type="password" name="confirmar_senha" required>

        <br><br>

        <button type="submit">
            Criar Conta
        </button>

    </form>

    <br>

    <a href="/">
        Voltar para Login
    </a>

</body>

</html>
